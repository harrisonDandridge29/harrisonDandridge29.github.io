<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Temple Men's Soccer 2024</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      font-family: "Helvetica Neue", sans-serif;
    }
    #map { flex: 3; }
    #story {
      flex: 1;
      padding: 1em;
      overflow-y: auto;
      background: #fafafa;
      border-left: 2px solid #ddd;
    }
    h2 { margin-top: 0; }
    button {
      display: block;
      margin: 1em 0;
      width: 100%;
      padding: 0.5em;
      border: none;
      background-color: #333;
      color: white;
      font-size: 1em;
      cursor: pointer;
      border-radius: 4px;
    }
    button:hover { background-color: #555; }
    img {
      width: 220px;
      height: auto;
      border-radius: 6px;
      margin-top: 5px;
    }
    button.active {
      background-color: #555;
      outline: 2px solid #cc0000;
  }
    .leaflet-popup-content {
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="story">
    <h2>A Fall Full of Travel for Temple Men's Soccer</h2>
    <p>Tracking cumulative travel for all games played in Temple's 2024 season</p>
    <button onclick="goToScene(0)">Game 1: Army (H)</button>
    <button onclick="goToScene(1)">Game 2: Villanova (H)</button>
    <button onclick="goToScene(2)">Game 3: Monmouth (H)</button>
    <button onclick="goToScene(3)">Game 4: American (A)</button>
    <button onclick="goToScene(4)">Game 5: Penn (A)</button>
    <button onclick="goToScene(5)">Game 6: Drexel (A)</button>
    <button onclick="goToScene(6)">Game 7: Akron (A)</button>
    <button onclick="goToScene(7)">Game 8: Charlotte (H)</button>
    <button onclick="goToScene(8)">Game 9: Saint Joe's (A)</button>
    <button onclick="goToScene(9)">Game 10: FAU (A)</button>
    <button onclick="goToScene(10)">Game 11: USF (A)</button>
    <button onclick="goToScene(11)">Game 12: Memphis (H)</button>
    <button onclick="goToScene(12)">Game 13: Mercyhurst (H)</button>
    <button onclick="goToScene(13)">Game 14: UAB (A)</button>
    <button onclick="goToScene(14)">Game 15: FIU (H)</button>
    <button onclick="goToScene(15)">Game 16: Tulsa (A)</button>
    <button onclick="goToScene(16)">Game 17: Charlotte (A)</button>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    var map = L.map('map').setView([39.973477505831234, -75.15744074249587], 15);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 19,
      attribution: '&copy; Esri'
    }).addTo(map);

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 19,
      opacity: 0.8
    }).addTo(map);

    var scenes = [
      { coords: [39.973477505831234, -75.15744074249587], text: "<b>Army</b> - 1-1 draw, first game of the year, buddy George scored a good goal", image: 'home.jpg' },
      { coords: [39.973477505831234, -75.15744074249587], text: "<b>Villanova</b> - 3-2 win, most fans I've seen at a game since coming here", image: 'home.jpg' },
      { coords: [39.973477505831234, -75.15744074249587], text: "<b>Monmouth</b> - 0-2 loss, was my collegiate debut but stinks we lost :(", image: 'home.jpg' },
      { coords: [39.15270175624072, -77.31017384191736], text: "<b>American</b> - 0-0 draw, one of the more boring games in my time here", image: 'american.jpg' },
      { coords: [39.946544172353576, -75.19000097570762], text: "<b>Penn</b> - 0-4 loss, worst result of the season but to a ranked team", image: 'penn.jpg' },
      { coords: [39.95977745684647, -75.2079008847572], text: "<b>Drexel</b> - 0-2 loss, (one of two) turning points this season", image: 'drexel.jpg' },
      { coords: [41.07437812399833, -81.51185038643465], text: "<b>Akron</b> - 1-0 win, had no reason to win this game but we scored a penalty in the last minute", image: 'akron.jpg' },
      { coords: [39.973477505831234, -75.15744074249587], text: "<b>Charlotte</b> - 0-1 loss, second game against ranked opponent, unlucky to lose this one", image: 'home.jpg' },
      { coords: [39.99467982296487, -75.23661638883424], text: "<b>Saint Joe's</b> - 0-2 loss, other turning point, bad loss to a bad team which waked us up for the rest of the year", image: 'saintjoe.jpg' },
      { coords: [26.37066069291292, -80.11200371556464], text: "<b>FAU</b> - 1-1 draw, decent performance, unlucky to not win this one", image: 'fau.jpg' },
      { coords: [28.06049677210648, -82.40379534097484], text: "<b>USF</b> - 0-2 loss, we played well this game, however USF was very strong this year", image: 'usf.jpg' },
      { coords: [39.973477505831234, -75.15744074249587], text: "<b>Memphis</b> - 0-0 draw, my first ever collegiate start, pretty boring game as well", image: 'home.jpg' },
      { coords: [39.973477505831234, -75.15744074249587], text: "<b>Mercyhurst</b> - 2-0 win against a new D1 team, helped us gain momentum into the final stretch", image: 'home.jpg' },
      { coords: [33.49789919240492, -86.81240081276171], text: "<b>UAB</b> - 1-0 win, very close game and very important to our playoff race", image: 'uab.jpg' },
      { coords: [39.973477505831234, -75.15744074249587], text: "<b>FIU</b> - 0-0 draw, this game was played on my birthday, another relatively boring one however", image: 'home.jpg' },
      { coords: [36.15288584671925, -95.95075176153807], text: "<b>Tulsa</b> - 1-0 win, this win secured a spot in conference playoffs, my roommate Lukas scored!", image: 'tulsa.jpg' },
      { coords: [35.30550966859816, -80.73811489918661], text: "<b>Charlotte</b> - 1-3 loss in playoffs, was a tough end to a roller coaster of a season", image: 'charlotte.jpg' }
    ];

    var prevLatLng = L.latLng(39.973477505831234, -75.15744074249587);
    var firstClick = true;

    function goToScene(i) {
      document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
document.querySelectorAll('button')[i].classList.add('active');
      var s = scenes[i];
      var dest = L.latLng(s.coords);
      var dist = prevLatLng.distanceTo(dest);
      var duration = firstClick ? 3 : Math.max(3, Math.min(8, dist / 200000 * 6));
      var zoom = dist > 1000000 ? 14 : dist > 300000 ? 15 : 16;
      prevLatLng = dest;
      firstClick = false;
      map.closePopup();

      function openPopup() {
        L.popup({ maxWidth: 250 })
          .setLatLng(s.coords)
          .setContent(`<div>${s.text}<br><img src="${s.image}" alt="Scene image"></div>`)
          .openOn(map);
      }

      if (dist < 100) {
  map.flyTo(s.coords, 16, { duration: 1.5 });
  map.once('moveend', openPopup);
} else {
  map.flyTo(s.coords, zoom, { duration: duration });
  map.once('moveend', openPopup);
}
    }
  </script>

</body>
</html>
