<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Breakfast Spending Habits in the US by County | ArcGIS Maps SDK for JavaScript 4.28</title>

    <link rel="stylesheet" href="https://js.arcgis.com/4.28/esri/themes/light/main.css" />
    <script src="https://js.arcgis.com/4.28/"></script>

    <style>
      html,
      body,
      #viewDiv {
        padding: 0;
        margin: 0;
        height: 100%;
        width: 100%;
      }
    </style>

    <script>
      require(["esri/Map", "esri/views/MapView", "esri/layers/FeatureLayer", "esri/widgets/Legend"], (
        Map,
        MapView,
        FeatureLayer,
        Legend
      ) => {
        const defaultSym = {
          type: "simple-fill", // autocasts as new SimpleFillSymbol()
          outline: {
            // autocasts as new SimpleLineSymbol()
            color: [128, 128, 128, 0.2],
            width: "0.5px"
          },
        };

        /*****************************************************************
         * Set a color visual variable on the renderer. Color visual variables
         * create continuous ramps that map low data values to weak or
         * neutral colors and high data values to strong/deep colors. Features
         * with data values in between the min and max data values are assigned
         * a color proportionally between the min and max colors.
         *****************************************************************/

        const renderer = {
          type: "simple", // autocasts as new SimpleRenderer()
          symbol: defaultSym,
          label: "County",
          visualVariables: [
            {
             type: "color",
              field: "X1147_X",
              normalizationField: "TOTPOP_CY",
              legendOptions: {
                title: "Per Capita Spending on Breakfast/Brunch Away from Home"
              },
              stops: [
                { value: 38,  color: "#fee8c8", label: "$38" },
                { value: 267, color: "#08306b", label: "$267" }
] // UVA colors as its march madness time
            }
          ]
        };
//using breakfasters dataset, has esri tapestry spending habit data on total amount spent away from home on breakfast/ brunch, in I believe 2015, as this is the year of the pop data. 
        const povLayer = new FeatureLayer({
          url:
            "https://services.arcgis.com/V6ZHFr6zdgNZuVG0/ArcGIS/rest/services/Breakfasters/FeatureServer/0",
          renderer: renderer,
          title: "Breakfast/Brunch Spending Away from Home in the US (2015)",
          popupTemplate: {
            // autocasts as new PopupTemplate()
            title: "<b>{COUNTY} County</b>",
            content: "An average of <b>${expression/per-capita}</b> was spent on breakfast or brunch away from home in {COUNTY} County. <hr><b>Total $ spent:</b> {expression/total-spent} <hr><b>Total population:</b> {expression/total-pop}",
              expressionInfos: [
                {//creating a per-capita calculation to give me the average amount spent by each person on bfast/brunch away from home in each county
                  name: "per-capita",
                  expression:
                  "Round($feature.X1147_X / $feature.TOTPOP_CY, 2)"
                },
                {
                  name: "total-spent",
                  expression:
                  "Text($feature.X1147_X, '$#,###')"
                },
                {
                  name: "total-pop",
                  expression:
                  "Text($feature.TOTPOP_CY,'#,###')"
                }
              ]
            
          }
        });

        const map = new Map({
          basemap: "gray-vector",
          layers: [povLayer]
        });

        const view = new MapView({
          container: "viewDiv",
          map: map,
          center: [-98.5, 39.0],
          zoom: 4
        });

        view.ui.add(
          new Legend({
            view: view
          }),
          "bottom-left"
        );
      });
    </script>
  </head>

  <body>
    <div id="viewDiv"></div>
  </body>
</html>
